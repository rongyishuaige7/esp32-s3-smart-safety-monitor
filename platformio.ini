; PlatformIO — ESP32-S3 + ESP-IDF
; 文档：https://docs.platformio.org/page/projectconf.html

[platformio]
; 使用 ESP-IDF 标准 main/ 组件布局（非默认 src/）
src_dir = main
; 必须选 S3 环境；若用 esp32dev 构建会得到 “Wrong --chip argument” 上传失败
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = espressif32@6.13.0
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
extra_scripts = pre:pio_pre_embed_web.py
; DevKitC-1-N8 为 8MB Flash（若模组为 4MB 请改为 4MB）
board_upload.flash_size = 8MB
build_flags =
    -DLOG_LOCAL_LEVEL=ESP_LOG_INFO
